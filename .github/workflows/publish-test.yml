name: Publish Windows Test Release

on:
  push:
    tags:
      - 'test-v*'

permissions:
  contents: write

jobs:
  publish-windows-test:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ($version -notmatch '^\d+\.\d+\.\d+-test\.(0|[1-9]\d*)$') {
            throw "Test release version must use SemVer prerelease format. Found $version."
          }
          if ("${{ github.ref_name }}" -ne "test-v$version") {
            throw "Release tag ${{ github.ref_name }} does not match app version test-v$version."
          }

      - name: Load release notes
        id: notes
        shell: pwsh
        run: |
          $body = if (Test-Path RELEASE_NOTES.md) {
            Get-Content -Raw RELEASE_NOTES.md
          } else {
            'Test Windows installer for BuildBook.'
          }
          "body<<BUILDBOOK_NOTES" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "BUILDBOOK_NOTES" >> $env:GITHUB_OUTPUT

      - name: Build and publish Windows TEST installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BuildBook ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: true
          args: --bundles nsis

      - name: Update TEST updater metadata
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $stableTag = 'test-latest'
          gh release view $stableTag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $stableTag --target "${{ github.sha }}" --title 'BuildBook test updater metadata' --notes 'Stable metadata endpoint for the latest BuildBook test prerelease.' --prerelease
          }
          New-Item -ItemType Directory -Force -Path updater-metadata | Out-Null
          gh release download "${{ github.ref_name }}" --pattern latest.json --dir updater-metadata --clobber
          if (!(Test-Path updater-metadata/latest.json)) {
            throw "Could not download latest.json from ${{ github.ref_name }}."
          }
          gh release upload $stableTag updater-metadata/latest.json --clobber
